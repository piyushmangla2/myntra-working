<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Bani Women — Myntra Brand OS v2</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{--fs:'DM Sans',-apple-system,sans-serif;--fm:'DM Mono',monospace;--ct:#1a1a18;--ct2:#5f5e5a;--ct3:#9b9a96;--cb:#fafaf8;--cb2:#f2f1ed;--cb3:#e8e7e2;--br:#e2e1dc;--br2:#d0cfc9;--cg:#3b6d11;--cgb:#eaf3de;--cr:#a32d2d;--crb:#fcebeb;--ca:#854f0b;--cab:#faeeda;--cp:#3c3489;--cpb:#eeedfe;--cc:#185fa5;--ccb:#e6f1fb;--rmd:8px;--rlg:14px}
@media(prefers-color-scheme:dark){:root{--ct:#f0efe9;--ct2:#a8a7a2;--ct3:#6b6a66;--cb:#181816;--cb2:#1e1e1a;--cb3:#252520;--br:#2a2a26;--br2:#333330;--cg:#6aad2a;--cgb:#1a2e0d;--cr:#d96060;--crb:#2e0f0f;--ca:#d4882a;--cab:#2e200a;--cp:#9490e8;--cpb:#1a1830;--cc:#5fa8e8;--ccb:#0d1f30}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fs);background:var(--cb);color:var(--ct);font-size:14px;line-height:1.5}
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:0 18px;height:48px;border-bottom:1px solid var(--br);background:var(--cb);flex-shrink:0;z-index:100}
.logo{font-size:13px;font-weight:600}.logo em{font-style:normal;color:var(--ct2);font-weight:400}
.logo-dot{width:7px;height:7px;border-radius:50%;background:#3b6d11;margin-right:5px;display:inline-block}
.tb-sp{flex:1}
.mp{display:flex;gap:3px;align-items:center}
.mpill{padding:3px 9px;border-radius:999px;font-size:11px;border:1px solid var(--br2);background:transparent;color:var(--ct2);cursor:pointer;font-family:var(--fs);transition:all .15s}
.mpill.active{background:var(--ct);color:var(--cb);border-color:var(--ct)}
.mpill.loaded{border-color:var(--cg);color:var(--cg)}
.mpill.loaded.active{background:var(--cg);color:#fff;border-color:var(--cg)}
.tb-tag{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--cb2);color:var(--ct2);border:1px solid var(--br)}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:190px;flex-shrink:0;border-right:1px solid var(--br);background:var(--cb);overflow-y:auto;padding:6px}
.content{flex:1;overflow-y:auto;padding:18px 22px 40px}
.ng{font-size:10px;font-weight:600;color:var(--ct3);text-transform:uppercase;letter-spacing:.08em;padding:3px 7px;margin-top:12px;margin-bottom:2px}
.ng:first-child{margin-top:0}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:6px 7px;border:none;border-radius:6px;font-size:12px;cursor:pointer;background:transparent;color:var(--ct2);text-align:left;font-family:var(--fs)}
.nb i{font-size:14px;width:14px;text-align:center;flex-shrink:0}
.nb .nl{flex:1}
.nb:hover:not(.active){background:var(--cb2)}
.nb.active{background:var(--cb2);color:var(--ct);font-weight:500}
.ntag{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--cpb);color:var(--cp);margin-left:auto}
.atag{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--crb);color:var(--cr);margin-left:auto}
.sec{display:none}.sec.active{display:block}
.sh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.stitle{font-size:17px;font-weight:600;letter-spacing:-.02em}
.ssub{font-size:12px;color:var(--ct2);margin-top:2px}
.card{background:var(--cb);border:1px solid var(--br);border-radius:var(--rlg);padding:1rem;margin-bottom:.875rem}
.card.cg{border-color:#97c459}.card.cr{border-color:#f09595}.card.ca{border-color:#fac775}.card.cp{border-color:#afa9ec}
.ctl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ct2);margin-bottom:.75rem}
.ctl.up{color:var(--cg)}.ctl.dn{color:var(--cr)}.ctl.warn{color:var(--ca)}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:7px;margin-bottom:1rem}
.mc{background:var(--cb2);border-radius:var(--rmd);padding:10px 12px;border:1px solid var(--br)}
.ml{font-size:10px;color:var(--ct2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;line-height:1.3}
.mv{font-size:16px;font-weight:500;color:var(--ct)}
.mv.up{color:var(--cg)}.mv.dn{color:var(--cr)}.mv.warn{color:var(--ca)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:.875rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.875rem;margin-bottom:.875rem}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:500}
.bc{background:#eeedfe;color:#3c3489}.bd{background:#fbeaf0;color:#72243e}
.bk{background:#e1f5ee;color:#085041}.bt2{background:#faeeda;color:#633806}.bo{background:#f1efe8;color:#444441}
.bTop{background:#1a2e0d;color:#6aad2a}.bTorso{background:#2e200a;color:#d4882a}.bTail{background:var(--cb2);color:var(--ct2);border:1px solid var(--br2)}
.tab-row{display:flex;gap:1px;background:var(--cb2);border-radius:var(--rmd);padding:3px;width:fit-content;margin-bottom:.875rem;flex-wrap:wrap;border:1px solid var(--br)}
.tab{padding:5px 13px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--ct2);border:none;background:transparent;white-space:nowrap;font-family:var(--fs)}
.tab.active{background:var(--cb);color:var(--ct);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.tw{overflow-x:auto;border-radius:var(--rmd);border:1px solid var(--br)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 9px;color:var(--ct2);font-weight:500;border-bottom:1px solid var(--br);font-size:11px;white-space:nowrap;background:var(--cb2);position:sticky;top:0;z-index:1}
td{padding:6px 9px;border-bottom:1px solid var(--br);white-space:nowrap;color:var(--ct)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--cb2)}
.up{color:var(--cg)}.dn{color:var(--cr)}.warn{color:var(--ca)}
.mono{font-family:var(--fm);font-size:11px}
.fsel{padding:6px 9px;border:1px solid var(--br2);border-radius:var(--rmd);font-size:12px;background:var(--cb);color:var(--ct);cursor:pointer;font-family:var(--fs)}
.sinput{flex:1;min-width:130px;padding:7px 9px;border:1px solid var(--br2);border-radius:var(--rmd);font-size:12px;background:var(--cb);color:var(--ct);font-family:var(--fs)}
.sinput:focus,.fsel:focus{outline:none;border-color:var(--br)}
.frow{display:flex;gap:6px;margin-bottom:.875rem;flex-wrap:wrap;align-items:center}
.ni{width:78px;padding:4px 7px;border:1px solid var(--br2);border-radius:var(--rmd);font-size:12px;background:var(--cb);color:var(--ct);text-align:right;font-family:var(--fm)}
.ni:focus{outline:none;border-color:var(--cp)}
.ni.ok{border-color:var(--cg)}.ni.warn{border-color:var(--ca)}.ni.bad{border-color:var(--cr)}
.btn{padding:7px 12px;border:none;border-radius:var(--rmd);font-size:12px;cursor:pointer;font-family:var(--fs);font-weight:500}
.btnp{background:var(--ct);color:var(--cb)}
.btns{background:transparent;color:var(--ct2);border:1px solid var(--br2)}
.btns:hover{background:var(--cb2)}
.btnsm{padding:4px 9px;font-size:11px}
.uz{border:1.5px dashed var(--br2);border-radius:var(--rlg);padding:1rem;text-align:center;cursor:pointer;transition:all .2s}
.uz:hover,.uz.drag{border-color:var(--ct2);background:var(--cb2)}
.uz.done{border-color:var(--cg);background:var(--cgb)}
.uz input{display:none}
.uz-icon{font-size:20px;color:var(--ct3);margin-bottom:3px;display:block}
.uz-lbl{font-size:12px;color:var(--ct2);margin:3px 0 2px}
.uz-sub{font-size:10px;color:var(--ct3)}
.brr{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.bl{font-size:12px;min-width:90px;color:var(--ct)}
.bt3{flex:1;height:5px;background:var(--cb3);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.bv{font-size:11px;color:var(--ct2);min-width:50px;text-align:right}
.pr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--br);font-size:12px;gap:8px}
.pr:last-child{border-bottom:none}
.ptot{display:flex;justify-content:space-between;padding:8px 0 4px;font-size:13px;font-weight:500;border-top:1.5px solid var(--br2);margin-top:5px}
.sepl{border:none;border-top:1px solid var(--br);margin:6px 0}
.ib{border-radius:var(--rmd);padding:9px 13px;margin-bottom:.875rem;font-size:12px;line-height:1.7}
.iba{background:var(--cab);border:1px solid #fac775;color:var(--ca)}
.ibg{background:var(--cgb);border:1px solid #97c459;color:var(--cg)}
.ibr{background:var(--crb);border:1px solid #f09595;color:var(--cr)}
.ibp{background:var(--cpb);border:1px solid #afa9ec;color:var(--cp)}
.ibb{background:var(--ccb);border:1px solid #a8cef0;color:var(--cc)}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:11px;margin:2px}
.pok{background:var(--cgb);color:var(--cg)}.pwarn{background:var(--cab);color:var(--ca)}.pinfo{background:var(--cpb);color:var(--cp)}.pdn{background:var(--crb);color:var(--cr)}
